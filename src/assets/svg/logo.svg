<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3 -3 42 40" fill="none">
  <defs>
    <!-- Horizontal spine gradient: bright left edge → dark right (realistic book lighting) -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#20c2db"/>
      <stop offset="18%"  stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#053d4c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1bb8d0"/>
      <stop offset="18%"  stop-color="#0c6e87"/>
      <stop offset="100%" stop-color="#043848"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1dbdd4"/>
      <stop offset="18%"  stop-color="#0d718c"/>
      <stop offset="100%" stop-color="#053a4a"/>
    </linearGradient>
    <linearGradient id="shelf-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d8fab"/>
      <stop offset="100%" stop-color="#032e3a"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-15%" width="170%" height="170%">
      <feDropShadow dx="2" dy="2.5" stdDeviation="1.8" flood-color="#011419" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- ════ BOOK 1 — left, tallest ════ -->
  <rect x="1"  y="3"  width="11" height="24" rx="2.5" fill="url(#g1)" filter="url(#sh)"/>
  <!-- spine left-edge shine -->
  <rect x="1"  y="3"  width="2.5" height="24" rx="1.5" fill="white" opacity="0.32"/>
  <!-- top cap shine -->
  <rect x="1"  y="3"  width="11" height="2.5"  rx="1.5" fill="white" opacity="0.22"/>
  <!-- page-block right edge -->
  <rect x="10.5" y="4" width="1.5" height="22.5" rx="0.8" fill="#c8eef5" opacity="0.35"/>
  <!-- dust-jacket band -->
  <rect x="1"  y="8"  width="11" height="4"   fill="#021e26" opacity="0.38"/>
  <!-- title line hints on spine -->
  <rect x="3"  y="15" width="7"  height="1.2" rx="0.6" fill="white" opacity="0.28"/>
  <rect x="3"  y="18" width="5"  height="1"   rx="0.5" fill="white" opacity="0.2"/>

  <!-- ════ BOOK 2 — center, shortest ════ -->
  <rect x="14" y="11" width="9"  height="16" rx="2.5" fill="url(#g2)" filter="url(#sh)" opacity="0.82"/>
  <rect x="14" y="11" width="2"  height="16" rx="1.5" fill="white" opacity="0.26"/>
  <rect x="14" y="11" width="9"  height="2.5" rx="1.5" fill="white" opacity="0.18"/>
  <rect x="21.5" y="11.5" width="1.5" height="15" rx="0.8" fill="#c8eef5" opacity="0.28"/>
  <!-- band -->
  <rect x="14" y="15" width="9"  height="3.5" fill="#021a22" opacity="0.34"/>

  <!-- ════ BOOK 3 — right, medium ════ -->
  <rect x="25" y="6"  width="11" height="21" rx="2.5" fill="url(#g3)" filter="url(#sh)"/>
  <rect x="25" y="6"  width="2.5" height="21" rx="1.5" fill="white" opacity="0.30"/>
  <rect x="25" y="6"  width="11" height="2.5" rx="1.5" fill="white" opacity="0.20"/>
  <rect x="34.5" y="6.5" width="1.5" height="20" rx="0.8" fill="#c8eef5" opacity="0.30"/>
  <!-- band -->
  <rect x="25" y="11" width="11" height="4"   fill="#021c24" opacity="0.36"/>
  <!-- title line hints -->
  <rect x="27" y="18" width="7"  height="1.2" rx="0.6" fill="white" opacity="0.24"/>

  <!-- ════ SHELF ════ -->
  <rect x="0"  y="27" width="37" height="4.5" rx="2"   fill="url(#shelf-g)" filter="url(#sh)"/>
  <!-- shelf top highlight -->
  <rect x="0"  y="27" width="37" height="1.6" rx="1.2" fill="white" opacity="0.28"/>

  <!-- ════ S BADGE — white bg + teal S (visible on any mode) ════ -->
  <circle cx="18" cy="17" r="8" fill="white" opacity="0.93"/>
  <text
    x="18" y="17.5"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="900"
    fill="#0e7490"
  >S</text>
</svg>
